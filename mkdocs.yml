site_name: SageTutorial 文档
site_url: https://arch.gh.wzhecnu.cn/SageTutorial/
repo_url: https://github.com/ChatArch/SageTutorial
repo_name: ChatArch/SageTutorial
edit_uri: edit/main/docs/
docs_dir: docs/
theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: zh
          default: true
          name: 中文
          build: true
          site_name: SageTutorial 文档
        - locale: en
          name: English
          build: true
          site_name: SageTutorial Documentation
          nav_translations:
            首页: Home
            入门: Getting Started
            Lie Theory: Lie Theory
            Quantum Groups: Quantum Groups
            示例: Examples
            参考: Reference
extra:
  alternate:
    - name: 中文
      link: /SageTutorial/
      lang: zh
    - name: English
      link: /SageTutorial/en/
      lang: en
nav:
  - 首页: index.md
  - 入门:
      - 快速开始: getting-started.md
  - Lie Theory:
      - 概念与 SageMath 映射: lie-theory-map.md
      - 能力边界: capability-report.md
  - Quantum Groups:
      - 量子群路线: quantum-groups.md
  - 示例:
      - A2 根系与 Weyl 群: examples/a2-root-weyl.md
      - B 型根格与权格: examples/b-type-root-weight-lattice.md
      - Lie algebra 与 crystals: examples/lie-crystal.md
      - q-number 与量子群边界: examples/q-numbers.md
  - 参考:
      - 源码和输出: reference.md
